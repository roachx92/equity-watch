name: What's New (single ticker)

# Ad-hoc, on-demand "what's new" news check for ONE watched ticker. Manually
# dispatched with a required `ticker` input. Claude runs the bounded parallel
# sub-agent scan, assesses each item against that ticker's §18 Edge/Tripwires,
# appends dated entries to tickers/<TICKER>/news.md, posts the digest to the
# ticker's Discord channel, then (inside the action, where git auth works)
# commits, pushes a branch, and opens a PR. A later step appends the run's token
# usage to that PR and squash-merges it, then kicks the Pages rebuild.

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker symbol to check (must already be covered under tickers/<TICKER>/)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write   # claude-code-action mints its GitHub token via OIDC

jobs:
  whats-new:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "equity-watch-bot"
          git config --global user.email "equity-watch-bot@users.noreply.github.com"

      - name: Resolve ticker & date
        id: meta
        env:
          RAW_TICKER: ${{ inputs.ticker }}
        run: |
          set -euo pipefail
          # Uppercase and strip whitespace. RAW_TICKER arrives via the env above,
          # not interpolated inline, so a crafted ticker cannot inject shell.
          TICKER=$(printf '%s' "$RAW_TICKER" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')
          if ! printf '%s' "$TICKER" | grep -Eq '^[A-Z0-9.-]{1,10}$'; then
            echo "::error::Invalid ticker input: '$RAW_TICKER'" >&2
            exit 1
          fi
          DATE=$(date -u +%Y-%m-%d)
          {
            echo "ticker=$TICKER"
            echo "date=$DATE"
            echo "branch=whats-new/${TICKER}-${DATE}-${GITHUB_RUN_ID}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ticker=$TICKER date=$DATE"

      - name: Materialize Discord webhook config
        env:
          WEBHOOKS_JSON: ${{ secrets.DISCORD_WEBHOOKS_JSON }}
        run: |
          set -euo pipefail
          if [ -n "${WEBHOOKS_JSON:-}" ]; then
            mkdir -p .secrets
            printf '%s' "$WEBHOOKS_JSON" > .secrets/discord-webhooks.json
            echo "Wrote .secrets/discord-webhooks.json from DISCORD_WEBHOOKS_JSON."
          else
            echo "DISCORD_WEBHOOKS_JSON not set — the Discord post will skip gracefully."
          fi

      - name: Run what's-new check
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # --model opus: the `opus` alias resolves to the latest Opus so it never
          # rots to a stale dated id.
          # --allowedTools: the headless action denies everything not on this list —
          # without it, Task/WebSearch/Write/Edit/Bash are all blocked and the run
          # finishes green having written nothing. Grant exactly what the check needs.
          claude_args: |
            --model opus
            --allowedTools "Task,WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash"
          prompt: |
            You are running in a fresh checkout of the roachx92/equity-watch repository.
            Git identity is already configured and the action's git auth lets you commit,
            push, and open a PR directly (Bash is allowed).

            Today's date is ${{ steps.meta.outputs.date }} (UTC). Use it as the anchor for
            the "since the last dated entry" search window and stamp it on every log entry,
            every source citation, and the digest.

            TARGET TICKER: ${{ steps.meta.outputs.ticker }}

            Run the bounded "what's new" news check for this ONE ticker, applying the
            framework files as written (never from memory — read them directly):
              1. framework/standing-rules.md — Sections A + E, binding on every step. This
                 bounded scan does NOT use Section A's "EXHAUSTIVE BY DEFAULT" deep-dive
                 depth; the window is bounded (news-check.md §A).
              2. framework/latest-updates-workflow.md — Section F (the procedure + the
                 mandatory §18 Tripwire/Edge assessment) and §F.1 (the canonical Recent
                 News Log entry format — apply it, do not restate it).
              3. framework/news-check.md — §A the parallel research-sub-agent method
                 (self-contained prompts, source quality, first-run ~14-day window) and
                 §B the run-summary chat-digest format.

            COVERAGE GUARD — do this first: a what's-new check presupposes the ticker
            already has a deep-dive and its §18 Edge/Tripwires. Confirm
            tickers/${{ steps.meta.outputs.ticker }}/news.md exists and carries an Edge and
            numbered Tripwires. **If the ticker is NOT covered (folder, news.md, or
            Edge/Tripwires missing), STOP — do NOT build a deep-dive and do NOT invent an
            Edge.** Print that the ticker isn't covered yet and finish WITHOUT committing or
            opening a PR.

            If covered:
              - Dispatch the bounded parallel research sub-agents per news-check.md §A. They
                research ONLY — they must not edit files. Wait for them, then YOU assess
                every item against the §18 Tripwire and Edge (tag [TRIPWIRE] / [EDGE+] /
                [EDGE-], surface a fired tripwire at the top).
              - Append full-detail, dated entries to
                tickers/${{ steps.meta.outputs.ticker }}/news.md's `## Recent News Log` per
                §F.1 (most recent first; never to the deep-dive report). If nothing material
                was found, leave news.md unchanged — do NOT add a "no news" placeholder.
              - Produce the §B run-summary chat digest and write it VERBATIM to
                `whats-new-digest.md` in the repo root. Always write it — even on a clean,
                nothing-fired check.
              - Post the digest to the ticker's Discord channel (add --tripwire-fired only
                if a [TRIPWIRE] hit this run):
                  python scripts/notify_discord_ticker.py \
                    --ticker ${{ steps.meta.outputs.ticker }} --kind whats-new \
                    --date ${{ steps.meta.outputs.date }} --text-file whats-new-digest.md
                The poster exits 0 and skips if no webhook is configured — that is expected.
              - PUBLISH via git (do this yourself; the workflow does NOT push):
                  git checkout -b ${{ steps.meta.outputs.branch }}
                  git add -A                          # whats-new-digest.md is gitignored
                  # If news.md changed, commit it; if the check was clean (no change),
                  # make an EMPTY commit so a PR still opens (the heartbeat):
                  git commit -m "whats-new: ${{ steps.meta.outputs.ticker }} ${{ steps.meta.outputs.date }}" \
                    || git commit --allow-empty -m "whats-new: ${{ steps.meta.outputs.ticker }} ${{ steps.meta.outputs.date }} (no material change)"
                  git push -u origin ${{ steps.meta.outputs.branch }}
                  gh pr create --base main --head ${{ steps.meta.outputs.branch }} \
                    --title "whats-new: ${{ steps.meta.outputs.ticker }} ${{ steps.meta.outputs.date }}" \
                    --body-file whats-new-digest.md
                Use that EXACT PR title. Do NOT merge the PR and do NOT push to main
                directly — a later workflow step appends token usage and squash-merges it.

      - name: Summarize token usage
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -uo pipefail
          python3 - "$EXECUTION_FILE" > "$RUNNER_TEMP/usage.md" <<'PY' || echo "_Token usage: unavailable._" > "$RUNNER_TEMP/usage.md"
          import json, sys, pathlib

          def emit(lines):
              print("\n".join(lines))
              sys.exit(0)

          p = sys.argv[1] if len(sys.argv) > 1 else ""
          if not p or not pathlib.Path(p).exists():
              emit(["_Token usage: unavailable (no execution file)._"])

          text = pathlib.Path(p).read_text(encoding="utf-8", errors="replace").strip()
          records = []
          try:
              data = json.loads(text)
              records = data if isinstance(data, list) else [data]
          except json.JSONDecodeError:
              for line in text.splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      records.append(json.loads(line))
                  except json.JSONDecodeError:
                      pass

          result = None
          for r in records:
              if isinstance(r, dict) and (r.get("type") == "result" or "total_cost_usd" in r):
                  result = r  # keep the last matching record

          if not result:
              emit(["_Token usage: unavailable (no result record found)._"])

          usage = result.get("usage") or {}
          def n(key):
              v = usage.get(key)
              return v if isinstance(v, int) else 0

          inp, out = n("input_tokens"), n("output_tokens")
          cache_r, cache_c = n("cache_read_input_tokens"), n("cache_creation_input_tokens")
          cost, turns = result.get("total_cost_usd"), result.get("num_turns")

          lines = ["**Token usage**", "", "| Metric | Value |", "| --- | --- |"]
          lines.append(f"| Input tokens | {inp:,} |")
          lines.append(f"| Output tokens | {out:,} |")
          if cache_r or cache_c:
              lines.append(f"| Cache read tokens | {cache_r:,} |")
              lines.append(f"| Cache creation tokens | {cache_c:,} |")
          if isinstance(cost, (int, float)):
              lines.append(f"| Cost (USD) | ${cost:.4f} |")
          if isinstance(turns, int):
              lines.append(f"| Turns | {turns} |")
          emit(lines)
          PY
          echo "----- usage.md -----"
          cat "$RUNNER_TEMP/usage.md"

      - name: Append token usage to the PR, then squash-merge it
        id: merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKER: ${{ steps.meta.outputs.ticker }}
          DATE: ${{ steps.meta.outputs.date }}
        run: |
          set -euo pipefail
          # Claude opened the PR from inside the action with this exact title.
          pr="$(gh pr list --state open \
                  --search "whats-new: ${TICKER} ${DATE} in:title" \
                  --json number --jq '.[0].number')"
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "No open 'whats-new: ${TICKER} ${DATE}' PR found (likely the ticker is"
            echo "not covered, so nothing was published). Nothing to merge."
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found PR #${pr} — appending token usage and merging."
          gh pr view "$pr" --json body --jq '.body' > "$RUNNER_TEMP/body-cur.md" || : > "$RUNNER_TEMP/body-cur.md"
          {
            cat "$RUNNER_TEMP/body-cur.md"
            printf '\n\n---\n\n'
            cat "$RUNNER_TEMP/usage.md"
          } > "$RUNNER_TEMP/body-new.md"
          gh pr edit "$pr" --body-file "$RUNNER_TEMP/body-new.md" || echo "(body edit failed; merging anyway)"
          gh pr merge "$pr" --squash --delete-branch
          echo "merged=true" >> "$GITHUB_OUTPUT"
          echo "Squash-merged PR #${pr}"

      - name: Rebuild the Pages site
        if: steps.merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # A merge made with GITHUB_TOKEN doesn't trigger the push-driven pages.yml
          # (GitHub's recursion guard), so kick it explicitly.
          gh workflow run pages.yml
