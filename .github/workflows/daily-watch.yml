name: Daily Equity Watch

on:
  # Daily scheduling now runs via a Claude Code Remote Routine (fires at
  # 7am Pacific daily into a fresh session), so the cron trigger here is
  # disabled to avoid double-running the watch and double-committing to
  # the ticker logs. Kept as workflow_dispatch for manual/ad-hoc runs.
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  daily-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "equity-watch-bot"
          git config --global user.email "equity-watch-bot@users.noreply.github.com"

      - name: Run daily equity watch
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The routine dispatches parallel research sub-agents (Task), does
          # web research (WebSearch/WebFetch), edits each ticker's news.md and
          # writes summaries/<today>.md (Write/Edit), and commits + pushes via
          # git (Bash). None of these are in the action's default headless
          # allowlist, so without this every such call is denied and the run
          # finishes green but writes nothing (see run 29651145196: 52 denials,
          # no commit). Grant exactly the tools daily-watch.md needs.
          claude_args: |
            --model opus
            --allowedTools "Task,WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash"
          prompt: |
            You are running in a fresh checkout of the roachx92/equity-watch
            repository at the current working directory. Git identity is
            already configured, so you can commit and push directly.

            First, run `date -u +%Y-%m-%d` to establish today's actual date
            (UTC) -- do not guess or infer it from memory/training data. Use
            that exact date as "today" throughout this run: in log entries,
            source citations, the commit message, and the run summary.

            Then read and follow daily-watch.md in this repo exactly, end to
            end. It is self-contained and references the framework/ files in
            the same repo (standing-rules.md and latest-updates-workflow.md).
            This includes: enumerating the ticker folders under tickers/ (one
            folder per watched ticker, each holding that ticker's news.md) and
            scanning each for news, tagging Tripwire/Edge hits per the
            framework, appending to each ticker's news.md Recent News Log,
            committing and pushing any changes to the default branch, and
            producing the final run summary (tripwires first, per-ticker recap
            conditional on a hit).

      - name: Auto-merge the daily-watch PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The routine follows the repo's CLAUDE.md git rule and opens a PR
          # ("daily watch: <date>") from a work/<date> branch rather than
          # pushing to main. Find that PR and squash-merge it so the daily
          # news.md + summaries/<date>.md updates land on main automatically
          # (which then triggers the Discord notify-discord.yml on the
          # summaries/** push). main is unprotected, so this merges
          # immediately. If a run pushed straight to main instead (no PR),
          # this finds nothing and no-ops.
          date="$(date -u +%Y-%m-%d)"
          pr="$(gh pr list --state open \
                  --search "daily watch: ${date} in:title" \
                  --json number,headRefName --jq '.[0].number')"
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "No open 'daily watch: ${date}' PR found; nothing to merge."
            exit 0
          fi
          echo "Squash-merging PR #${pr}..."
          gh pr merge "$pr" --squash --delete-branch
