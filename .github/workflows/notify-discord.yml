name: Notify Discord

on:
  push:
    branches: [main]
    paths:
      - 'summaries/**'
  workflow_dispatch:
    inputs:
      summary_path:
        description: 'Path to a summary file to post (e.g. summaries/2026-07-15.md)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with previous commit for diff)
        uses: actions/checkout@v4
        with:
          # full history so github.event.before is always reachable —
          # a shallow clone can silently miss added files on a
          # multi-commit push and post nothing (exit 0, no signal)
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Post summaries to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PATH: ${{ inputs.summary_path }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ ! -f "$MANUAL_PATH" ]; then
              echo "ERROR: $MANUAL_PATH does not exist on this ref." >&2
              exit 1
            fi
            files="$MANUAL_PATH"
            echo "Manual dispatch — posting: $files"
          else
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              base="HEAD^"
            else
              base="$BEFORE_SHA"
            fi
            files=$(git diff --name-only --diff-filter=A "$base" "$AFTER_SHA" -- 'summaries/**' || true)
            if [ -z "$files" ]; then
              echo "No newly added summaries in this push; nothing to post."
              exit 0
            fi
            echo "Newly added summaries:"; echo "$files"
          fi
          printf '%s\n' "$files" | while IFS= read -r f; do
            [ -n "$f" ] || continue
            url="$SERVER_URL/$REPOSITORY/blob/$AFTER_SHA/$f"
            python scripts/notify_discord.py "$f" --file-url "$url"
          done
